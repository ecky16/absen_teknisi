<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Absen PROBOLINGGO 2.0 — v3.0</title>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0f;
      --card: #17171b;
      --text: #f5f7fb;
      --muted: #aab0bd;
      --danger: #ff4d4f;
      --brand: #b40000;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif; color: var(--text); background: var(--bg); }
    header { background: var(--brand); padding: 16px; text-align: center; position: sticky; top: 0; z-index: 2; }
    header h1 { margin:0; font-size: 18px; letter-spacing:.2px }

    main { max-width: 760px; margin: 18px auto; padding: 0 16px; }
    .board { background: var(--card); border: 1px solid #22252b; border-radius: 14px; padding: 18px; text-align: center; box-shadow: 0 8px 24px rgb(0 0 0 / .25); }

    .qr-wrap { display: inline-block; background: #fff; padding: 18px; border-radius: 10px; box-shadow: 0 0 0 1px #fff; }
    canvas#qr { display:block; image-rendering: pixelated; }

    .sub { margin-top: 10px; font-size: 14px; color: var(--muted); }
    .token { margin-top: 8px; font-size: 15px; color: #7CFC00; word-break: break-all; }
    .time { margin-top: 2px; font-size: 14px; color: #d7d9de; }

    .status { margin-top: 12px; font-size: 13px; color: var(--muted); }
    .status.ok { color: #00d68f; }
    .status.err { color: #ff4d4f; }

    .actions { margin-top: 12px; }
    .actions a { background:#21242a; color:#fff; border:1px solid #2a2e35; padding:8px 12px; border-radius:12px; text-decoration:none; display:inline-block; }

    footer { text-align:center; color:#8b90a0; font-size:12px; margin: 18px 0 28px; }

    @media (max-width: 420px){ header h1 { font-size: 16px; } }
  </style>
</head>
<body>
  <header>
    <h1>📸 QR Absen — Area PROBOLINGGO</h1>
  </header>
  <main>
    <section class="board">
      <div class="qr-wrap"><canvas id="qr" width="360" height="360" aria-label="Kode QR"></canvas></div>
      <div class="sub" id="note">Auto-refresh setiap <b><span id="refreshSec">30</span>s</b>.</div>
      <div class="token" id="tokenDisplay">Memuat token…</div>
      <div class="time" id="waktu">—</div>
      <div class="status" id="status">Siap.</div>
      <div class="actions"><a href="index.html">Ganti Area</a></div>
    </section>
    <footer>SAPA QR v3.0 • 2025 (Local Mode)</footer>
  </main>

<script>
(async () => {
  // === ✅ LOGIN GUARD ===
  const isAuthorized = sessionStorage.getItem('loginQR') === 'true';
  if (!isAuthorized) {
    alert("🔒 Akses ditolak. Silakan login dahulu.");
    location.href = "index.html";
    return;
  }

  // ==========================================
  // ⚙️ KONFIGURASI UTAMA (UBAH SESUAI AREA)
  // ==========================================
  const AREA = "PBL2"; // <- GANTI INI UNTUK AREA LAIN
  const SECRET_KEY = "SAPA_QR_RAHASIA_TA"; // Kunci rahasia (SAMA UNTUK SEMUA AREA & GAS)
  const REFRESH_SEC = 30; // QR Berubah tiap 30 detik
  const BOT_DEEPLINK_BASE = "https://t.me/absensi_qr_bot?start=";
  // ==========================================

  const elQR = document.getElementById('qr');
  const elToken = document.getElementById('tokenDisplay');
  const elTime = document.getElementById('waktu');
  const elStatus = document.getElementById('status');
  document.getElementById('refreshSec').textContent = REFRESH_SEC.toString();

  // Atur ukuran QR
  function computeQRSize(){
    const vw = Math.min(window.innerWidth, 760) - 64;
    return Math.max(220, Math.min(420, Math.floor(vw)));
  }

  const qr = new QRious({ element: elQR, size: computeQRSize(), level: 'H', background: '#ffffff', foreground: '#000000' });
  window.addEventListener('resize', () => { qr.set({ size: computeQRSize() }); });

  let lastToken = '';

  function fmtNow(){
    const now = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    elTime.textContent = now.toLocaleDateString('id-ID', opts) + ' • ' + now.toLocaleTimeString('id-ID');
  }

  // === MESIN PEMBUAT TOKEN (TOTP LOKAL - 0 FETCH) ===
  async function generateLocalToken() {
    const epochSeconds = Math.floor(Date.now() / 1000);
    // Waktu dibagi durasi (30s) agar token tetap sama selama rentang waktu itu
    const timeSlot = Math.floor(epochSeconds / REFRESH_SEC); 
    
    // Gabung waktu dengan Secret Key & Area agar token unik dan anti-tebak
    const rawData = timeSlot + "_" + SECRET_KEY + "_" + AREA;

    // Proses Kriptografi (SHA-256) bawaan browser
    const msgBuffer = new TextEncoder().encode(rawData);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    
    // Ambil 6 karakter unik
    const token = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 6).toUpperCase();
    return token;
  }

  // === LOOP UTAMA ===
  async function tick() {
    fmtNow();
    try {
      const newToken = await generateLocalToken();
      
      // Jika token baru berbeda dari yang tampil, update layar
      if (newToken !== lastToken) {
        lastToken = newToken;
        elToken.textContent = 'Token: ' + newToken;
        qr.value = BOT_DEEPLINK_BASE + encodeURIComponent(newToken + "_" + AREA);
      }
      
      elStatus.textContent = '🟢 Aktif - 0 Fetch API';
      elStatus.className = 'status ok';
    } catch (e) {
      elStatus.textContent = 'Error Generate: ' + e.message;
      elStatus.className = 'status err';
    }
  }

  // Eksekusi fungsi tick tiap 1 detik (hanya cek jam, tidak menyedot kuota)
  setInterval(tick, 1000);
  tick(); // Eksekusi pertama saat halaman dimuat
})();
</script>
</body>
</html>

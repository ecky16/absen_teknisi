<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login QR Absen — OTP System</title>
  <style>
    body { font-family:'Segoe UI',sans-serif; background:#111; color:#fff; text-align:center; margin:0; }
    header { background:#b40000; padding:20px; }
    header img { width:220px; }
    header h1 { margin:10px 0 0; font-size:1.5em; }
    header h2 { margin:5px 0 0; font-size:1.2em; }
    .container { padding:40px 20px; }

    input[type="password"]{
      font-size:1.1em; padding:12px; width:100%; max-width:300px; margin:20px auto 10px;
      border:1px solid #2a2a2e; border-radius:8px; text-align:center; background:#101010; color:#fff;
      display:block;
    }
    .btn{
      font-size:1.05em; background:#b40000; color:#fff; border:none; border-radius:10px; cursor:pointer;
      padding:14px; transition:background-color .3s ease, transform .15s ease; width:100%; max-width:300px; margin:8px auto 0;
    }
    .btn:hover{ background:#ff1c1c; transform:scale(1.03); }
    .btn:disabled { background: #555; cursor: not-allowed; }

    .area-selection{ display:none; margin-top:24px; }
    .cluster-badge{ display:inline-block; padding:6px 12px; border:1px solid #ff7a7a; color:#ffd3d3; border-radius:999px; margin-bottom:12px; }
    .area-title{ font-size:1.1em; margin:6px 0 16px; color:#ccc; }
    .area-grid{
      display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:15px; max-width:520px; margin:0 auto;
    }
    .area-grid .btn{ max-width:unset; height: 100%; }
    .btn small { font-size: 10px; opacity: 0.7; display: block; margin-bottom: 2px; }
    @media (max-width:480px){ .area-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Logo Telkom Akses" onerror="this.src='logo_telkom_akses.png'" />
  <h1>SAPA - QR</h1>
  <h2>SISTEM ABSENSI PAKAI QR</h2>
</header>

<div class="container">
  <div id="login-form">
    <p>Masukkan password dari Bot Telegram Korlap:</p>
    <input type="password" id="pass" placeholder="" />
    <button onclick="cekPassword()" id="btnLog" class="btn">🔒 Masuk</button>
    <div id="err" style="display:none; color:#ffc1c1; margin-top:8px;"></div>
  </div>

  <div id="area-selection" class="area-selection">
    <div class="cluster-badge">AKSES DIBERIKAN</div>
    <p class="area-title">📌 Pilih area untuk menampilkan QR:</p>
    <div class="area-grid" id="areaGrid"></div>
    <div style="margin-top:24px;">
      <button class="btn" onclick="logout()" style="background:#333; font-size: 0.8em; max-width: 150px;">Keluar</button>
    </div>
  </div>
</div>

<script>
  // 1. GANTI DENGAN URL WEB APP GAS ANDA
  const API_URL = "https://script.google.com/macros/s/AKfycbzH7Mzki5gHcjasHIAHluJ-YbM6SdbOgI76Q-3kM2qPeZcDAVyDYB2N4uH3Uds3VJ83/exec";

  // 2. DAFTAR SEMUA AREA (JEMBER & PASURUAN)
  const ALL_AREAS = [
    { cluster: "PASURUAN", label:"📍 Pasuruan", href:"psn.html" },
    { cluster: "PASURUAN", label:"📍 Plasa", href:"plasa.html" },
    { cluster: "PASURUAN", label:"📍 Probolinggo", href:"pbl.html" },
    { cluster: "PASURUAN", label:"📍 Probolinggo 2", href:"pbl2.html" },
    { cluster: "PASURUAN", label:"📍 Kraksaan", href:"krz.html" },
    { cluster: "PASURUAN", label:"📍 Lumajang", href:"lmj.html" },
    { cluster: "JEMBER", label:"📍 Jember", href:"jember.html" },
    { cluster: "JEMBER", label:"📍 Kebonsari", href:"kebonsari.html" },
    { cluster: "JEMBER", label:"📍 Puger", href:"puger.html" },
    { cluster: "JEMBER", label:"📍 Situbondo", href:"situbondo.html" },
    { cluster: "JEMBER", label:"📍 Bondowoso", href:"bondowoso.html" },
    { cluster: "JEMBER", label:"📍 Banyuwangi", href:"banyuwangi.html" },
    { cluster: "JEMBER", label:"📍 Genteng", href:"genteng.html" }
  ];

  async function cekPassword() {
    const pass = document.getElementById("pass").value.trim();
    const btn = document.getElementById("btnLog");
    const err = document.getElementById("err");

    if (!pass) return;

    btn.disabled = true;
    btn.innerText = "Memvalidasi...";
    err.style.display = "none";

    try {
      // Tembak ke API Google Apps Script
      const response = await fetch(`${API_URL}?action=login&pass=${encodeURIComponent(pass)}`);
      const result = await response.json();

      if (result.status === "success") {
        // Simpan status login
        sessionStorage.setItem("loginQR", "true");
        showDashboard();
      } else {
        err.innerText = result.message || "Password salah atau kedaluwarsa.";
        err.style.display = "block";
        btn.disabled = false;
        btn.innerText = "🔒 Masuk";
      }
    } catch (e) {
      err.innerText = "Gagal terhubung ke server.";
      err.style.display = "block";
      btn.disabled = false;
      btn.innerText = "🔒 Masuk";
    }
  }

  function showDashboard() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("area-selection").style.display = "block";
    const grid = document.getElementById('areaGrid');
    grid.innerHTML = "";

    ALL_AREAS.forEach(a => {
      const b = document.createElement('button');
      b.className = "btn";
      b.innerHTML = `<small>${a.cluster}</small>${a.label}`;
      b.onclick = () => { location.href = a.href; };
      grid.appendChild(b);
    });
  }

  function logout() {
    sessionStorage.removeItem("loginQR");
    location.reload();
  }

  window.onload = function() {
    if (sessionStorage.getItem("loginQR") === "true") {
      showDashboard();
    }
  };
</script>

</body>
</html>
